<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сквозная аналитика по ответственным — Битрикс24</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/airbnb.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f7;
      --bg-card: #ffffff;
      --bg-input: #f5f5f7;
      --border: #e5e5ea;
      --border-hover: #d1d1d6;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-muted: #aeaeb2;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --blue: #007aff;
      --purple: #af52de;
      --green: #34c759;
      --amber: #ff9500;
      --red: #ff3b30;
      --teal: #5ac8fa;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .app { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ─── Header ─── */
    .header { margin-bottom: 28px; text-align: center; }
    .header h1 {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

    /* ─── Cards ─── */
    .card {
      background: var(--bg-card); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); padding: 20px 24px;
      margin-bottom: 16px; transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: var(--shadow); }

    /* ─── Settings ─── */
    .settings-bar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .settings-bar label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .settings-bar input[type="text"] {
      flex: 1; min-width: 280px; padding: 10px 14px; font-size: 13px;
      font-family: inherit; background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .settings-bar input[type="text"]:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
    }

    .btn {
      padding: 10px 22px; font-size: 13px; font-weight: 600; font-family: inherit;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-success { background: var(--green); color: #fff; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 700; }
    .btn-success:hover { background: #2db84e; }
    .btn-success:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Status ─── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .status-badge.connected { background: rgba(52,199,89,0.1); color: #248a3d; }
    .status-badge.disconnected { background: rgba(255,59,48,0.1); color: var(--red); }
    .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-badge.connected .dot { background: var(--green); }
    .status-badge.disconnected .dot { background: var(--red); }

    /* ─── Filters ─── */
    .filters-row {
      display: flex; gap: 12px; align-items: end; flex-wrap: wrap; margin-bottom: 12px;
    }
    .filters-row:last-child { margin-bottom: 0; }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ─── Date Range Input ─── */
    .date-range-input {
      width: 240px; height: 42px; padding: 0 14px;
      font-size: 13px; font-family: inherit;
      background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      outline: none; cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      box-sizing: border-box;
    }
    .date-range-input:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
    }

    /* ─── Quick Period ─── */
    .period-presets { display: flex; gap: 4px; flex-wrap: nowrap; }
    .period-presets button {
      padding: 0 12px; font-size: 13px; font-weight: 500; height: 42px; flex: none;
      background: var(--bg-input); color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: 20px; cursor: pointer;
      transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center;
      white-space: nowrap;
    }
    .period-presets button:disabled { opacity: 0.5; cursor: not-allowed; }
    .period-presets button:hover { background: #eee; color: var(--text-primary); }
    .period-presets button.active {
      background: var(--text-primary); color: #fff; border-color: var(--text-primary);
    }

    /* ─── Combo Box ─── */
    .combo-box { position: relative; min-width: 150px; width: 100%; }
    .combo-input {
      width: 100%; height: 42px; padding: 0 28px 0 12px; text-overflow: ellipsis;
      font-size: 13px; font-family: inherit;
      background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
      cursor: pointer; box-sizing: border-box;
    }
    .combo-input:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
      cursor: text;
    }
    .combo-chevron {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; pointer-events: none;
      color: var(--text-muted); transition: transform 0.2s;
    }
    .combo-box.open .combo-chevron { transform: translateY(-50%) rotate(180deg); }
    .combo-dropdown {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); box-shadow: var(--shadow-lg);
      max-height: 240px; overflow-y: auto; z-index: 100; padding: 4px;
    }
    .combo-box.open .combo-dropdown { display: block; }
    .combo-option {
      padding: 9px 12px; font-size: 13px; border-radius: 8px;
      cursor: pointer; transition: background 0.1s; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .combo-option:hover, .combo-option.highlighted { background: rgba(0,113,227,0.08); }
    .combo-option.selected { font-weight: 600; color: var(--accent); }
    .combo-empty { padding: 12px; font-size: 12px; color: var(--text-muted); text-align: center; }

    /* ─── Metrics Bar ─── */
    .metrics-bar {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .metric-card {
      display: flex; align-items: center; gap: 14px;
      background: var(--bg-card); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); padding: 16px 24px;
      flex: 1; min-width: 220px;
    }
    .metric-card .mc-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .metric-card .mc-icon svg { width: 20px; height: 20px; }
    .metric-card .mc-body { display: flex; flex-direction: column; gap: 2px; }
    .metric-card .mc-label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .metric-card .mc-value { font-size: 24px; font-weight: 800; letter-spacing: -0.3px; }
    .metric-card .mc-pct { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-left: 6px; }
    .metric-card .mc-detail { font-size: 11px; color: var(--text-muted); }

    .metric-card.spam { border-left: 4px solid var(--red); }
    .metric-card.spam .mc-icon { background: rgba(255,59,48,0.1); color: var(--red); }
    .metric-card.spam .mc-value { color: var(--red); }

    .metric-card.pending { border-left: 4px solid var(--amber); }
    .metric-card.pending .mc-icon { background: rgba(255,149,0,0.1); color: var(--amber); }
    .metric-card.pending .mc-value { color: var(--amber); }

    .metric-card.time { border-left: 4px solid var(--teal); }
    .metric-card.time .mc-icon { background: rgba(90,200,250,0.1); color: var(--teal); }
    .metric-card.time .mc-value { color: var(--text-primary); }

    /* ─── Funnel ─── */
    .funnel-section {
      background: var(--bg-card); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); padding: 32px;
      margin-bottom: 16px; overflow: hidden;
    }
    .funnel-title {
      font-size: 15px; font-weight: 700; color: var(--text-primary);
      margin-bottom: 28px; text-align: center;
    }
    .funnel {
      max-width: 620px; margin: 0 auto;
      display: flex; flex-direction: column; align-items: center;
    }
    .funnel-stage {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .funnel-bar {
      height: 54px; border-radius: 14px; display: flex;
      align-items: center; justify-content: center; gap: 10px;
      color: #fff; transition: transform 0.2s, filter 0.15s; cursor: default;
      margin: 0 auto; overflow: hidden; white-space: nowrap;
      max-width: 100%; box-sizing: border-box; min-width: 54px;
    }
    .funnel-bar:hover { transform: scale(1.015); filter: brightness(1.06); }
    .fb-0 { background: linear-gradient(135deg, #007aff, #5ac8fa); }
    .fb-1 { background: linear-gradient(135deg, #af52de, #da8fff); }
    .fb-2 { background: linear-gradient(135deg, #34c759, #6ee08a); }
    .funnel-bar .fv { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
    .funnel-bar .fl { font-size: 13px; font-weight: 500; opacity: 0.88; }
    .funnel-label-ext {
      display: none; font-size: 13px; font-weight: 600; color: var(--text-secondary); white-space: nowrap;
    }
    .funnel-stage.narrow .funnel-bar .fl { display: none; }
    .funnel-stage.narrow .funnel-label-ext { display: inline; }
    .funnel-gap {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 6px 0; color: var(--text-muted); flex-wrap: wrap;
    }
    .funnel-gap svg { width: 14px; height: 14px; opacity: 0.35; }
    .fg-badge {
      background: var(--bg-secondary); padding: 2px 10px; border-radius: 10px;
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
    }
    .fg-spam {
      background: rgba(255,59,48,0.08); padding: 2px 10px; border-radius: 10px;
      font-size: 11px; font-weight: 600; color: var(--red);
    }
    .fg-pending {
      background: rgba(255,149,0,0.08); padding: 2px 10px; border-radius: 10px;
      font-size: 11px; font-weight: 600; color: var(--amber);
    }
    .funnel-revenue {
      margin-top: 24px; padding-top: 24px;
      border-top: 1px dashed var(--border);
      text-align: center; width: 100%;
    }
    .funnel-revenue-inner {
      display: inline-flex; align-items: baseline; justify-content: center;
      gap: 12px; padding: 16px 32px;
      background: linear-gradient(135deg, rgba(255,149,0,0.1), rgba(255,179,64,0.1));
      border: 1px solid rgba(255,149,0,0.2); border-radius: 16px;
      color: var(--amber); transition: transform 0.2s; cursor: default;
    }
    .funnel-revenue-inner:hover { transform: scale(1.02); }
    .funnel-revenue-inner .rev-label { font-size: 15px; font-weight: 600; opacity: 0.9; }
    .funnel-revenue-inner .rev-val { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }

    /* ─── Table ─── */
    .table-section {
      background: var(--bg-card); border-radius: var(--radius);
      box-shadow: var(--shadow-sm); overflow: hidden;
    }
    .table-header {
      padding: 18px 24px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--border);
      flex-wrap: wrap; gap: 8px;
    }
    .table-header h2 { font-size: 15px; font-weight: 700; }
    .table-header span { font-size: 12px; color: var(--text-muted); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      padding: 12px 14px; text-align: center;
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
      background: var(--bg-secondary); border-bottom: 1px solid var(--border);
      white-space: nowrap; cursor: pointer; user-select: none;
      transition: color 0.15s;
    }
    thead th:nth-child(2) { text-align: left; }
    thead th:hover { color: var(--text-primary); }
    thead th.sorted { color: var(--accent); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(0,122,255,0.03); }
    tbody td {
      padding: 14px; white-space: nowrap;
      text-align: center; font-variant-numeric: tabular-nums;
    }
    tbody td:nth-child(2) { text-align: left; }
    td.name-cell { font-weight: 600; color: var(--text-primary); }
    td.num { font-weight: 500; }
    td.highlight-blue { color: var(--blue); font-weight: 600; }
    td.highlight-red { color: var(--red); font-weight: 600; }
    td.highlight-orange { color: var(--amber); font-weight: 600; }
    td.highlight-green { color: #248a3d; font-weight: 600; }
    td.highlight-amber { color: #c77800; font-weight: 700; }
    td.highlight-teal { color: #0891b2; font-weight: 600; }
    td.rank { width: 40px; font-weight: 700; font-size: 13px; color: var(--text-muted); }
    td.rank.top-1 { color: var(--amber); }
    td.rank.top-2 { color: #8e8e93; }
    td.rank.top-3 { color: #c77800; }

    /* ─── States ─── */
    .state-message { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 14px; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-text { font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 6px; }
    .fade-in { animation: fadeIn 0.35s ease-out both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .app { padding: 16px 12px 60px; }
      .filters-row { flex-direction: column; }
      .filter-group { width: 100%; }
      .date-range-input { width: 100%; }
      .period-presets { flex-wrap: wrap; }
      .combo-box { min-width: unset; width: 100%; }
      .settings-bar { flex-direction: column; align-items: stretch; }
      .settings-bar input[type="text"] { min-width: unset; }
      .metrics-bar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Сквозная аналитика</h1>
      <p>Битрикс24 CRM — когортный анализ лидов в разрезе ответственных</p>
    </div>

    <div class="card" style="display:none;">
      <div class="settings-bar">
        <label>Вебхук</label>
        <input type="text" id="webhookUrl" placeholder="https://your-domain.bitrix24.ru/rest/ID/KEY/">
        <div id="connectionStatus"></div>
        <button class="btn btn-primary" id="btnConnect" onclick="initConnection()">Подключить</button>
      </div>
    </div>

    <div class="card" id="filtersPanel" style="display:none;">
      <div class="filters-row">
        <div class="filter-group">
          <label>Период анализа</label>
          <input type="text" id="dateRangePicker" class="date-range-input" placeholder="Выберите период" readonly>
        </div>
        <div class="filter-group">
          <label>Быстрый выбор</label>
          <div class="period-presets" id="quickDates">
            <button onclick="setPeriod('today', this)">Сегодня</button>
            <button onclick="setPeriod('week', this)">Неделя</button>
            <button onclick="setPeriod('month', this)" class="active">Месяц</button>
            <button onclick="setPeriod('quarter', this)">Квартал</button>
            <button onclick="setPeriod('year', this)">Год</button>
          </div>
        </div>
      </div>
      <div class="filters-row">
        <div class="filter-group" style="flex:1;">
          <label>Воронка</label>
          <div class="combo-box" id="categoryCombo" data-value="all">
            <input class="combo-input" placeholder="Все воронки" value="Все воронки" autocomplete="off">
            <svg class="combo-chevron" viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
            <div class="combo-dropdown"></div>
          </div>
        </div>
        <div class="filter-group" style="flex:1;">
          <label>Ответственный</label>
          <div class="combo-box" id="userCombo" data-value="all">
            <input class="combo-input" placeholder="Все сотрудники" value="Все сотрудники" autocomplete="off">
            <svg class="combo-chevron" viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
            <div class="combo-dropdown"></div>
          </div>
        </div>
        <div class="filter-group" style="flex:0 0 auto; align-self: end;">
          <button class="btn btn-success" id="btnLoad" onclick="loadData()">Загрузить</button>
        </div>
      </div>
    </div>

    <!-- Metrics Bar: Spam + In-Progress + Median -->
    <div class="metrics-bar" id="metricsBar" style="display:none;">
      <div class="metric-card spam fade-in">
        <div class="mc-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm6.31-3.1L7.1 5.69C8.45 4.63 10.15 4 12 4c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9z"/></svg></div>
        <div class="mc-body">
          <span class="mc-label">Спам / Не наш профиль</span>
          <div><span class="mc-value" id="spamValue">0</span><span class="mc-pct" id="spamPct"></span></div>
          <span class="mc-detail" id="spamDetail"></span>
        </div>
      </div>
      <div class="metric-card pending fade-in" style="animation-delay:.04s">
        <div class="mc-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg></div>
        <div class="mc-body">
          <span class="mc-label">В работе (на конец периода)</span>
          <div><span class="mc-value" id="pendingValue">0</span><span class="mc-pct" id="pendingPct"></span></div>
          <span class="mc-detail" id="pendingDetail"></span>
        </div>
      </div>
      <div class="metric-card time fade-in" style="animation-delay:.08s">
        <div class="mc-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg></div>
        <div class="mc-body">
          <span class="mc-label">Медиана обработки лида</span>
          <div><span class="mc-value" id="medianValue">—</span></div>
          <span class="mc-detail" id="medianDetail"></span>
        </div>
      </div>
    </div>

    <!-- Funnel -->
    <div class="funnel-section" id="funnelSection" style="display:none;">
      <div class="funnel-title">Воронка продаж</div>
      <div class="funnel" id="funnelChart"></div>
    </div>

    <!-- Table -->
    <div class="table-section" id="tableSection" style="display:none;">
      <div class="table-header">
        <h2>Сравнение по ответственным</h2>
        <span id="tableSubtitle"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:40px">#</th>
              <th data-sort="name">Ответственный</th>
              <th data-sort="leads">Лиды</th>
              <th data-sort="spamCount">Спам</th>
              <th data-sort="inProgressCount">В работе</th>
              <th data-sort="deals">Сделки</th>
              <th data-sort="wonCount">Успешные</th>
              <th data-sort="conversion">Конв.</th>
              <th data-sort="avgProcessingHours">Ср. время</th>
              <th data-sort="revenue" class="sorted">Выручка ▼</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const DEFAULT_WEBHOOK = 'https://tstarter.bitrix24.ru/rest/19294/sf99bv6v2j28o0jg/';

const RETAIL_EMPLOYEES_MAP = {
  "Сервис Горки Склад": "мск розница",
  "Братеево Розница": "мск розница",
  "Александр Куликов": "мск розница",
  "ЕКБ ТКАЧЕЙ": "екб розница",
  "ЕКБ Автомагистральная": "екб розница",
  "ЕКБ Металлургов": "екб розница",
  "ЕКБ Шефская": "екб розница",
  "ЕКБ Бебеля": "екб розница",
  "ЕКБ Березовский": "екб розница",
  "Сергей Селиванов": "крд розница",
  "Евгений Лебедев": "крд розница",
  "КРД Российская": "крд розница",
  "Калининград Портовая": "клд розница",
  "Калининград Яблочная": "клд розница",

  "Алексей Исаев": "алм розница",
  "Дмитрий Петухов": "аст розница"
};

const KZT_FUNNEL_NAMES = [
  "КЗ опт развитие", "КЗ возврат надлеж качество", "КЗ возврат по гарантии",
  "АЛМ розница", "АСТ розница"
];
let rateCache = new Map();

async function getKztToRubRate(dateStr) {
  if (!dateStr) return 0.2;
  const dateOnly = dateStr.split('T')[0];
  if (rateCache.has(dateOnly)) return await rateCache.get(dateOnly);

  const promise = (async () => {
    let currentD = new Date(dateOnly);
    for (let attempt = 0; attempt < 7; attempt++) {
      const yyyy = currentD.getFullYear();
      const mm = String(currentD.getMonth() + 1).padStart(2, '0');
      const dd = String(currentD.getDate()).padStart(2, '0');
      const cacheKey = `${yyyy}-${mm}-${dd}`;
      if (rateCache.has(cacheKey) && typeof rateCache.get(cacheKey) === 'number') return rateCache.get(cacheKey);
      try {
        const url = `https://www.cbr-xml-daily.ru/archive/${yyyy}/${mm}/${dd}/daily_json.js`;
        const resp = await fetch(url);
        if (resp.ok) {
          const data = await resp.json();
          if (data?.Valute?.KZT) {
            const rate = data.Valute.KZT.Value / data.Valute.KZT.Nominal;
            rateCache.set(cacheKey, rate);
            return rate;
          }
        }
      } catch (e) { console.warn("CBR rate fetch fallback", cacheKey); }
      currentD.setDate(currentD.getDate() - 1);
    }
    return 0.2;
  })();

  rateCache.set(dateOnly, promise);
  const finalRate = await promise;
  rateCache.set(dateOnly, finalRate);
  return finalRate;
}

let WEBHOOK_URL = '';
let users = [];
let categories = [];
let currentSort = { key: 'revenue', dir: 'desc' };
let lastResults = [];
let fpInstance = null;

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('b24_webhook') || DEFAULT_WEBHOOK;
  document.getElementById('webhookUrl').value = saved;
  initDatepicker();
  setupSorting();
  if (saved) initConnection();
});

function initDatepicker() {
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  fpInstance = flatpickr("#dateRangePicker", {
    mode: "range", showMonths: window.innerWidth > 768 ? 2 : 1,
    locale: "ru", dateFormat: "Y-m-d", altInput: true, altFormat: "d.m.Y",
    defaultDate: [monthStart, now],
    onChange: function(sel) {
      if (sel.length === 2) document.querySelectorAll('.period-presets button').forEach(b => b.classList.remove('active'));
    }
  });
}

function formatDate(d) { return d.toISOString().split('T')[0]; }

function setPeriod(type, el) {
  const now = new Date();
  let from;
  switch (type) {
    case 'today': from = new Date(now); break;
    case 'week': from = new Date(now); from.setDate(from.getDate() - ((from.getDay() + 6) % 7)); break;
    case 'month': from = new Date(now.getFullYear(), now.getMonth(), 1); break;
    case 'quarter': from = new Date(now.getFullYear(), Math.floor(now.getMonth() / 3) * 3, 1); break;
    case 'year': from = new Date(now.getFullYear(), 0, 1); break;
  }
  if (fpInstance) fpInstance.setDate([from, now]);
  if (el) {
    document.querySelectorAll('.period-presets button').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }
}

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function bx24(method, params = {}) {
  const body = new URLSearchParams();
  flattenParams(params, '', body);
  const resp = await fetch(WEBHOOK_URL + method, { method: 'POST', body });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

function flattenParams(obj, prefix, out) {
  for (const [key, val] of Object.entries(obj)) {
    const fk = prefix ? `${prefix}[${key}]` : key;
    if (val !== null && typeof val === 'object' && !Array.isArray(val)) flattenParams(val, fk, out);
    else if (Array.isArray(val)) val.forEach((item, i) => out.append(`${fk}[${i}]`, item));
    else out.append(fk, val);
  }
}

async function bx24FetchAll(method, params, progressCb) {
  let items = [], start = 0;
  while (true) {
    const result = await bx24(method, { ...params, start });
    items = items.concat(result.result || []);
    if (progressCb) progressCb(items.length, result.total || items.length);
    if (result.next) { start = result.next; } else break;
  }
  return items;
}

// ═══════════════════════════════════════════════════════════
// CONNECTION
// ═══════════════════════════════════════════════════════════
async function initConnection() {
  let url = document.getElementById('webhookUrl').value.trim();
  if (!url.endsWith('/')) url += '/';
  WEBHOOK_URL = url;
  const btn = document.getElementById('btnConnect');
  const status = document.getElementById('connectionStatus');
  btn.disabled = true; btn.textContent = 'Подключение...';
  status.innerHTML = '';

  try {
    const [usersResult, catResult] = await Promise.all([
      bx24('user.get', { ACTIVE: 'true' }),
      bx24('crm.category.list', { entityTypeId: 2 })
    ]);

    let allUsers = (usersResult.result || []).map(u => ({
      ID: u.ID, name: `${u.NAME || ''} ${u.LAST_NAME || ''}`.trim() || `User #${u.ID}`
    }));
    if (usersResult.next) {
      let ns = usersResult.next;
      while (ns) {
        const more = await bx24('user.get', { ACTIVE: 'true', start: ns });
        allUsers = allUsers.concat((more.result || []).map(u => ({
          ID: u.ID, name: `${u.NAME || ''} ${u.LAST_NAME || ''}`.trim() || `User #${u.ID}`
        })));
        ns = more.next || null;
      }
    }

    const allowedUserNames = Object.keys(RETAIL_EMPLOYEES_MAP);
    users = allUsers.filter(u => allowedUserNames.includes(u.name));
    if (users.length === 0) {
      status.innerHTML = `<span class="status-badge disconnected"><span class="dot"></span>Нет сотрудников для розницы</span>`;
      btn.textContent = 'Подключить'; btn.disabled = false; return;
    }
    users.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

    const allowedFunnelsLower = ['екб розница','крд розница','клд розница','мск розница','алм розница','аст розница'];
    categories = (catResult.result?.categories || [])
      .map(c => ({ id: String(c.id), name: c.name }))
      .filter(c => allowedFunnelsLower.includes(c.name.toLowerCase()));

    const catOptions = [{ value: 'all', label: 'Все воронки' }, ...categories.map(c => ({ value: c.id, label: c.name }))];
    initComboBox('categoryCombo', catOptions, 'all');
    const userOptions = [{ value: 'all', label: 'Все сотрудники' }, ...users.map(u => ({ value: u.ID, label: u.name }))];
    initComboBox('userCombo', userOptions, 'all');

    localStorage.setItem('b24_webhook', url);
    status.innerHTML = `<span class="status-badge connected"><span class="dot"></span>Подключено · ${users.length} сотрудников</span>`;
    document.getElementById('filtersPanel').style.display = '';
    btn.textContent = 'Переподключить';
  } catch (err) {
    status.innerHTML = `<span class="status-badge disconnected"><span class="dot"></span>Ошибка: ${err.message}</span>`;
    btn.textContent = 'Подключить';
  }
  btn.disabled = false;
}

// ═══════════════════════════════════════════════════════════
// DATA LOADING — Period-bound cohort analysis
// ═══════════════════════════════════════════════════════════
async function loadData() {
  if (!fpInstance || fpInstance.selectedDates.length !== 2) { alert('Выберите начальную и конечную дату'); return; }
  const dateFrom = formatDate(fpInstance.selectedDates[0]);
  const dateTo = formatDate(fpInstance.selectedDates[1]);
  const userId = document.getElementById('userCombo').dataset.value;
  const categoryId = document.getElementById('categoryCombo').dataset.value;

  const btn = document.getElementById('btnLoad');
  btn.disabled = true; btn.textContent = 'Загрузка...';

  document.getElementById('metricsBar').style.display = '';
  document.getElementById('funnelSection').style.display = '';
  document.getElementById('tableSection').style.display = '';

  const COLS = 10;
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = `<tr><td colspan="${COLS}"><div class="state-message"><div class="spinner"></div>Загрузка данных...<p class="progress-text" id="progressText">Подготовка</p></div></td></tr>`;
  document.getElementById('funnelChart').innerHTML = '<div class="state-message"><div class="spinner"></div></div>';
  ['spamValue','pendingValue','medianValue'].forEach(id => document.getElementById(id).textContent = '...');
  ['spamPct','spamDetail','pendingPct','pendingDetail','medianDetail'].forEach(id => document.getElementById(id).textContent = '');

  try {
    const dateToNext = new Date(dateTo);
    dateToNext.setDate(dateToNext.getDate() + 1);
    const dateToStr = formatDate(dateToNext); // exclusive upper bound

    const selUsers = userId === 'all' ? [] : userId.split(',');
    const selCats = categoryId === 'all' ? [] : categoryId.split(',');

    let activeFunnelsLower = [];
    if (selCats.length === 0) activeFunnelsLower = categories.map(c => c.name.toLowerCase());
    else activeFunnelsLower = categories.filter(c => selCats.includes(c.id)).map(c => c.name.toLowerCase());

    let baseUsersByFunnel = users.filter(u => {
      const funnel = RETAIL_EMPLOYEES_MAP[u.name];
      return funnel && activeFunnelsLower.includes(funnel);
    });
    let targetUsers = baseUsersByFunnel;
    if (selUsers.length > 0) targetUsers = baseUsersByFunnel.filter(u => selUsers.includes(String(u.ID)));

    if (targetUsers.length === 0) {
      tbody.innerHTML = `<tr><td colspan="${COLS}"><div class="state-message" style="color:var(--text-secondary)">Нет ответственных для данных воронок</div></td></tr>`;
      btn.disabled = false; btn.textContent = 'Загрузить'; return;
    }

    let results = await loadCohortData(targetUsers, dateFrom, dateToStr, selCats, selUsers);

    if (selUsers.length === 0) {
      results = results.filter(r => r.leads > 0 || r.deals > 0 || r.wonCount > 0 || r.revenue > 0);
    }
    results.forEach(r => { r.conversion = r.deals > 0 ? (r.wonCount / r.deals * 100) : 0; });

    lastResults = results;
    sortResults();

    const totals = results.reduce((a, r) => {
      a.leads += r.leads; a.deals += r.deals;
      a.wonCount += r.wonCount; a.revenue += r.revenue;
      a.spamCount += r.spamCount; a.inProgressCount += r.inProgressCount;
      return a;
    }, { leads: 0, deals: 0, wonCount: 0, revenue: 0, spamCount: 0, inProgressCount: 0 });

    const allTimes = results.flatMap(r => r.processingTimes || []);
    const medianHours = calculateMedian(allTimes);

    renderMetrics(totals, medianHours, allTimes.length);
    renderFunnel(totals);
    renderTable(results);

    const d1 = new Date(dateFrom).toLocaleDateString('ru-RU');
    const d2 = new Date(dateTo).toLocaleDateString('ru-RU');
    document.getElementById('tableSubtitle').textContent =
      `${d1} — ${d2} · ${results.length} сотрудников`;
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="${COLS}"><div class="state-message" style="color:var(--red)">Ошибка: ${err.message}</div></td></tr>`;
    console.error(err);
  }
  btn.disabled = false; btn.textContent = 'Загрузить';
}

async function loadCohortData(targetUsers, dateFrom, dateTo, selCats, selUsers) {
  // dateTo is the exclusive upper boundary (day AFTER user-selected end date)
  const kztNamesLower = KZT_FUNNEL_NAMES.map(n => n.toLowerCase());
  const kztCategoryIds = categories.filter(c => kztNamesLower.includes(c.name.toLowerCase())).map(c => c.id);
  const targetUserIds = targetUsers.map(u => String(u.ID));

  // ─── 1. Load leads created in period ───
  updateProgress('Загрузка когорты лидов...');
  const leadFilter = { '>=DATE_CREATE': dateFrom, '<DATE_CREATE': dateTo };
  if (targetUserIds.length > 0) leadFilter.ASSIGNED_BY_ID = targetUserIds;

  const allLeads = await bx24FetchAll('crm.lead.list', {
    filter: leadFilter,
    select: ['ID', 'ASSIGNED_BY_ID', 'DATE_CREATE', 'DATE_CLOSED', 'STATUS_SEMANTIC_ID']
  }, (loaded, total) => updateProgress(`Лиды: ${loaded}/${total}`));

  const cohortLeadIds = new Set(allLeads.map(l => String(l.ID)));

  // ─── 2. Load deals created in period (with upper bound!) ───
  updateProgress('Загрузка сделок в периоде...');
  const dealFilter = { '>=DATE_CREATE': dateFrom, '<DATE_CREATE': dateTo };
  if (targetUserIds.length > 0) dealFilter.ASSIGNED_BY_ID = targetUserIds;
  if (selCats.length > 0) dealFilter.CATEGORY_ID = selCats.length === 1 ? selCats[0] : selCats;

  const allDeals = await bx24FetchAll('crm.deal.list', {
    filter: dealFilter,
    select: ['ID', 'ASSIGNED_BY_ID', 'LEAD_ID', 'STAGE_SEMANTIC_ID', 'OPPORTUNITY', 'CATEGORY_ID', 'CLOSEDATE', 'DATE_CREATE']
  }, (loaded, total) => updateProgress(`Сделки: ${loaded}/${total}`));

  // Filter to cohort deals: from cohort leads OR created directly without lead
  const dbDateFrom = dateFrom.split('T')[0];
  const dbDateTo = dateTo.split('T')[0]; // exclusive

  const cohortDeals = allDeals.filter(d => {
    if (d.LEAD_ID && cohortLeadIds.has(String(d.LEAD_ID))) return true;
    if (!d.LEAD_ID) {
      const dDateStr = (d.DATE_CREATE || '').split('T')[0];
      if (dDateStr >= dbDateFrom && dDateStr < dbDateTo) return true;
    }
    return false;
  });

  // ─── 3. Preload KZT rates ───
  const kztDates = new Set();
  cohortDeals.forEach(d => {
    if (d.STAGE_SEMANTIC_ID === 'S' && kztCategoryIds.includes(String(d.CATEGORY_ID)) && d.CLOSEDATE) {
      kztDates.add(d.CLOSEDATE.split('T')[0]);
    }
  });
  if (kztDates.size > 0) {
    updateProgress(`Загрузка курсов валют (${kztDates.size} дней)...`);
    await Promise.all([...kztDates].map(date => getKztToRubRate(date)));
  }

  // ─── 4. Build per-user stats ───
  const stats = {};
  targetUsers.forEach(u => {
    stats[u.ID] = {
      leads: 0, deals: 0, wonCount: 0, revenue: 0,
      spamCount: 0, inProgressCount: 0, processingTimes: []
    };
  });

  // Lead stats — period-bound: only count events that happened WITHIN the period
  allLeads.forEach(l => {
    const s = stats[l.ASSIGNED_BY_ID];
    if (!s) return;
    s.leads++;

    const closedDate = l.DATE_CLOSED ? l.DATE_CLOSED.split('T')[0] : null;
    const closedInPeriod = closedDate && closedDate >= dbDateFrom && closedDate < dbDateTo;

    // Spam: only if closed within period with F status
    if (closedInPeriod && l.STATUS_SEMANTIC_ID === 'F') {
      s.spamCount++;
    }

    // In progress: NOT closed by end of period
    if (!closedDate || closedDate >= dbDateTo) {
      s.inProgressCount++;
    }

    // Processing time: only for leads closed within period
    if (closedInPeriod && l.DATE_CREATE) {
      const created = new Date(l.DATE_CREATE);
      const closed = new Date(l.DATE_CLOSED);
      const hours = (closed - created) / (1000 * 60 * 60);
      if (hours >= 0 && isFinite(hours)) s.processingTimes.push(hours);
    }
  });

  // Deal stats — period-bound: won only if CLOSEDATE within period
  for (const d of cohortDeals) {
    const s = stats[d.ASSIGNED_BY_ID];
    if (!s) continue;
    s.deals++;

    const dealCloseDate = d.CLOSEDATE ? d.CLOSEDATE.split('T')[0] : null;
    const wonInPeriod = d.STAGE_SEMANTIC_ID === 'S'
      && dealCloseDate && dealCloseDate >= dbDateFrom && dealCloseDate < dbDateTo;

    if (wonInPeriod) {
      s.wonCount++;
      let val = parseFloat(d.OPPORTUNITY || 0);
      if (kztCategoryIds.includes(String(d.CATEGORY_ID)) && d.CLOSEDATE) {
        val = val * (await getKztToRubRate(d.CLOSEDATE.split('T')[0]));
      }
      s.revenue += val;
    }
  }

  return targetUsers.map(u => {
    const s = stats[u.ID];
    const avgH = s.processingTimes.length > 0
      ? s.processingTimes.reduce((a, b) => a + b, 0) / s.processingTimes.length
      : null;
    return {
      id: u.ID, name: u.name,
      leads: s.leads, deals: s.deals, wonCount: s.wonCount, revenue: s.revenue,
      spamCount: s.spamCount, inProgressCount: s.inProgressCount,
      avgProcessingHours: avgH, processingTimes: s.processingTimes
    };
  });
}

function updateProgress(text) {
  const el = document.getElementById('progressText');
  if (el) el.textContent = text;
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function renderMetrics(totals, medianHours, sampleCount) {
  // Spam
  document.getElementById('spamValue').textContent = totals.spamCount.toLocaleString('ru-RU');
  const spamPct = totals.leads > 0 ? (totals.spamCount / totals.leads * 100).toFixed(1) : '0';
  document.getElementById('spamPct').textContent = ` (${spamPct}%)`;
  document.getElementById('spamDetail').textContent = `закрыто в спам из ${totals.leads.toLocaleString('ru-RU')} лидов`;

  // In progress
  document.getElementById('pendingValue').textContent = totals.inProgressCount.toLocaleString('ru-RU');
  const pendPct = totals.leads > 0 ? (totals.inProgressCount / totals.leads * 100).toFixed(1) : '0';
  document.getElementById('pendingPct').textContent = ` (${pendPct}%)`;
  document.getElementById('pendingDetail').textContent = `не обработаны на конец периода`;

  // Median
  if (medianHours === null || sampleCount === 0) {
    document.getElementById('medianValue').textContent = '—';
    document.getElementById('medianDetail').textContent = 'нет закрытых лидов в периоде';
  } else {
    document.getElementById('medianValue').textContent = formatDuration(medianHours);
    document.getElementById('medianDetail').textContent = `по ${sampleCount} обработанным лидам`;
  }
}

function renderFunnel(totals) {
  const steps = [
    { label: 'Лиды', value: totals.leads, idx: 0 },
    { label: 'Сделки', value: totals.deals, idx: 1 },
    { label: 'Успешные', value: totals.wonCount, idx: 2 }
  ];
  const maxVal = Math.max(totals.leads, 1);

  let html = '';
  steps.forEach((step, i) => {
    const val = step.value.toLocaleString('ru-RU');
    const pct = (step.value / maxVal) * 100;
    const w = Math.max(8, pct);
    const isNarrow = w < 25;

    html += `<div class="funnel-stage fade-in ${isNarrow ? 'narrow' : ''}" style="animation-delay:${i * 0.06}s">
      <div class="funnel-bar fb-${step.idx}" style="width:${w}%"><span class="fv">${val}</span><span class="fl">${step.label}</span></div>
      <span class="funnel-label-ext">${step.label}</span>
    </div>`;

    if (i < steps.length - 1) {
      const rate = step.value > 0 ? ((steps[i + 1].value / step.value) * 100).toFixed(1) : '—';
      let extras = '';
      if (i === 0) {
        // Between Leads → Deals: show spam + in-progress
        if (totals.spamCount > 0) {
          const sp = (totals.spamCount / totals.leads * 100).toFixed(1);
          extras += `<span class="fg-spam">✕ ${totals.spamCount} спам (${sp}%)</span>`;
        }
        if (totals.inProgressCount > 0) {
          const pp = (totals.inProgressCount / totals.leads * 100).toFixed(1);
          extras += `<span class="fg-pending">⏳ ${totals.inProgressCount} в работе (${pp}%)</span>`;
        }
      }
      html += `<div class="funnel-gap fade-in" style="animation-delay:${i * 0.06 + 0.03}s">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
        <span class="fg-badge">${rate}%</span>${extras}
      </div>`;
    }
  });

  html += `<div class="funnel-revenue fade-in" style="animation-delay:${steps.length * 0.06}s">
    <div class="funnel-revenue-inner">
      <span class="rev-label">Выручка</span>
      <span class="rev-val">${formatMoney(totals.revenue)}</span>
    </div>
  </div>`;

  document.getElementById('funnelChart').innerHTML = html;
}

function renderTable(results) {
  const COLS = 10;
  const tbody = document.getElementById('tableBody');
  if (results.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${COLS}"><div class="state-message">Нет данных за выбранный период</div></td></tr>`;
    return;
  }
  tbody.innerHTML = results.map((r, i) => {
    const rc = i === 0 ? 'top-1' : i === 1 ? 'top-2' : i === 2 ? 'top-3' : '';
    const timeStr = r.avgProcessingHours !== null ? formatDuration(r.avgProcessingHours) : '—';
    return `<tr class="fade-in" style="animation-delay:${i * 0.02}s">
      <td class="rank ${rc}">${i + 1}</td>
      <td class="name-cell">${escHtml(r.name)}</td>
      <td class="num highlight-blue">${r.leads.toLocaleString('ru-RU')}</td>
      <td class="num highlight-red">${r.spamCount.toLocaleString('ru-RU')}</td>
      <td class="num highlight-orange">${r.inProgressCount.toLocaleString('ru-RU')}</td>
      <td class="num">${r.deals.toLocaleString('ru-RU')}</td>
      <td class="num highlight-green">${r.wonCount.toLocaleString('ru-RU')}</td>
      <td class="num">${r.conversion.toFixed(1)}%</td>
      <td class="num highlight-teal">${timeStr}</td>
      <td class="num highlight-amber">${formatMoney(r.revenue)}</td>
    </tr>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// SORTING
// ═══════════════════════════════════════════════════════════
function setupSorting() {
  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (currentSort.key === key) currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
      else { currentSort.key = key; currentSort.dir = key === 'name' ? 'asc' : 'desc'; }
      sortResults();
      renderTable(lastResults);
      document.querySelectorAll('thead th').forEach(t => {
        t.classList.remove('sorted');
        t.textContent = t.textContent.replace(/ [▲▼]/g, '');
      });
      th.classList.add('sorted');
      th.textContent += currentSort.dir === 'desc' ? ' ▼' : ' ▲';
    });
  });
}

function sortResults() {
  const { key, dir } = currentSort;
  lastResults.sort((a, b) => {
    let va = a[key], vb = b[key];
    if (va === null || va === undefined) va = -Infinity;
    if (vb === null || vb === undefined) vb = -Infinity;
    if (typeof va === 'string') return dir === 'asc' ? va.localeCompare(vb, 'ru') : vb.localeCompare(va, 'ru');
    return dir === 'asc' ? va - vb : vb - va;
  });
}

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
function formatMoney(amount) {
  if (amount >= 1_000_000) return (amount / 1_000_000).toFixed(2).replace('.', ',') + ' млн ₽';
  return amount.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ₽';
}

function formatDuration(hours) {
  if (hours < 1) return Math.round(hours * 60) + 'м';
  if (hours < 24) {
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    return m > 0 ? `${h}ч ${m}м` : `${h}ч`;
  }
  const days = Math.floor(hours / 24);
  const rh = Math.floor(hours % 24);
  return rh > 0 ? `${days}д ${rh}ч` : `${days}д`;
}

function calculateMedian(arr) {
  if (arr.length === 0) return null;
  const sorted = [...arr].sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ═══════════════════════════════════════════════════════════
// COMBO BOX
// ═══════════════════════════════════════════════════════════
function initComboBox(comboId, options, selectedValue) {
  const box = document.getElementById(comboId);
  const input = box.querySelector('.combo-input');
  const dropdown = box.querySelector('.combo-dropdown');
  box._options = options;
  box._selected = new Set([String(selectedValue)]);
  box._highlighted = -1;

  box.updateSelection = function(newSet) {
    box._selected = new Set(newSet);
    updateInput();
  };

  function updateInput() {
    if (box._selected.has('all')) {
      const allOpt = options.find(o => String(o.value) === 'all');
      input.value = allOpt ? allOpt.label : 'Все';
      input._displayLabel = input.value;
      box.dataset.value = 'all';
    } else if (box._selected.size === 0) {
      input.value = 'Нет выбранных';
      input._displayLabel = input.value;
      box.dataset.value = 'none';
    } else {
      const sels = options.filter(o => box._selected.has(String(o.value)) && String(o.value) !== 'all');
      const text = sels.map(s => s.label).join(', ');
      input.value = text;
      input._displayLabel = text;
      box.dataset.value = Array.from(box._selected).join(',');
    }
  }
  updateInput();

  function renderDropdown(filter = '') {
    const q = filter.toLowerCase();
    const filtered = q ? box._options.filter(o => o.label.toLowerCase().includes(q)) : box._options;
    if (filtered.length === 0) { dropdown.innerHTML = '<div class="combo-empty">Ничего не найдено</div>'; return; }
    dropdown.innerHTML = filtered.map((o, i) => {
      const v = String(o.value);
      const isSel = box._selected.has('all') || box._selected.has(v);
      const chk = `<input type="checkbox" ${isSel ? 'checked' : ''} style="margin-right:8px;pointer-events:none;accent-color:var(--accent);">`;
      return `<div class="combo-option ${isSel ? 'selected' : ''}" data-value="${escHtml(v)}" data-idx="${i}" title="${escHtml(o.label)}">${chk}${highlightMatch(o.label, q)}</div>`;
    }).join('');
    box._highlighted = -1;
  }

  function highlightMatch(text, q) {
    if (!q) return escHtml(text);
    const idx = text.toLowerCase().indexOf(q);
    if (idx === -1) return escHtml(text);
    return escHtml(text.slice(0, idx)) + '<b style="color:var(--accent)">' + escHtml(text.slice(idx, idx + q.length)) + '</b>' + escHtml(text.slice(idx + q.length));
  }

  function openDropdown() { box.classList.add('open'); renderDropdown(input.value === input._displayLabel ? '' : input.value); }
  function closeDropdown() { box.classList.remove('open'); input.value = input._displayLabel; }

  function toggleOption(val) {
    if (val === 'all') {
      if (box._selected.has('all')) box._selected.clear();
      else { box._selected.clear(); box._selected.add('all'); }
    } else {
      if (box._selected.has('all')) {
        box._selected.delete('all');
        options.forEach(o => { if (String(o.value) !== 'all' && String(o.value) !== val) box._selected.add(String(o.value)); });
      } else {
        if (box._selected.has(val)) box._selected.delete(val);
        else box._selected.add(val);
      }
    }
    if (box._selected.size === options.length - 1) {
      const allNonAll = options.filter(o => String(o.value) !== 'all');
      if (allNonAll.every(o => box._selected.has(String(o.value)))) { box._selected.clear(); box._selected.add('all'); }
    }
    updateInput();
    renderDropdown(input.value === input._displayLabel ? '' : input.value);
  }

  input.addEventListener('focus', () => { if (!box.classList.contains('open')) { openDropdown(); input.select(); } });
  box.addEventListener('click', (e) => {
    if (e.target.closest('.combo-dropdown')) return;
    if (box.classList.contains('open')) { if (e.target === input) input.select(); else closeDropdown(); }
    else { input.focus(); openDropdown(); input.select(); }
  });
  input.addEventListener('input', () => { if (!box.classList.contains('open')) box.classList.add('open'); renderDropdown(input.value); });

  dropdown.addEventListener('click', (e) => {
    const opt = e.target.closest('.combo-option');
    if (!opt) return;
    e.stopPropagation();
    toggleOption(opt.dataset.value);
    if (comboId === 'categoryCombo' && window.syncUsersWithCategories) window.syncUsersWithCategories();
  });

  input.addEventListener('keydown', (e) => {
    const items = dropdown.querySelectorAll('.combo-option');
    if (!items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); box._highlighted = Math.min(box._highlighted + 1, items.length - 1); updateHighlight(items); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); box._highlighted = Math.max(box._highlighted - 1, 0); updateHighlight(items); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      if (box._highlighted >= 0 && items[box._highlighted]) {
        toggleOption(items[box._highlighted].dataset.value);
        if (comboId === 'categoryCombo' && window.syncUsersWithCategories) window.syncUsersWithCategories();
      }
    }
    else if (e.key === 'Escape') { closeDropdown(); input.blur(); }
  });

  function updateHighlight(items) {
    items.forEach((it, i) => it.classList.toggle('highlighted', i === box._highlighted));
    if (items[box._highlighted]) items[box._highlighted].scrollIntoView({ block: 'nearest' });
  }

  document.addEventListener('click', (e) => { if (!box.contains(e.target)) closeDropdown(); });
}

window.syncUsersWithCategories = function() {
  const categoryId = document.getElementById('categoryCombo').dataset.value;
  const selCats = categoryId === 'all' ? [] : categoryId.split(',');
  let activeFunnelsLower = [];
  if (selCats.length === 0) activeFunnelsLower = categories.map(c => c.name.toLowerCase());
  else activeFunnelsLower = categories.filter(c => selCats.includes(c.id)).map(c => c.name.toLowerCase());

  const userBox = document.getElementById('userCombo');
  const newSet = new Set();
  if (selCats.length === 0) newSet.add('all');
  else {
    users.forEach(u => {
      const funnel = RETAIL_EMPLOYEES_MAP[u.name];
      if (funnel && activeFunnelsLower.includes(funnel)) newSet.add(String(u.ID));
    });
    if (newSet.size === 0) newSet.add('none');
  }
  if (userBox.updateSelection) userBox.updateSelection(newSet);
};
